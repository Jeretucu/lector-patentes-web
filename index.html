<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cochera</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1220; color:#e5e7eb; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

/* ---- header ---- */
header { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
h1 { font-size:1.1rem; } h1 span { color:#4fc3f7; }
#startbtn { padding:7px 16px; border:2px solid #16a34a; border-radius:20px; background:#0b1220;
            color:#fff; font-size:.85rem; font-weight:600; cursor:pointer; }
#startbtn.on { background:#16a34a; }

/* ---- video ---- */
.stage { position:relative; background:#000; width:100%; }
#canvas { width:100%; display:block; max-height:45vh; object-fit:contain; background:#000; }
#video { display:none; }
#hud { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.6); padding:4px 8px;
       border-radius:6px; font-size:.75rem; color:#4ade80; pointer-events:none; }

/* ---- panel deteccion ---- */
.detect-panel { padding:12px 14px; border-bottom:1px solid #1f2937; }
.plate-big { font-size:2.4rem; font-weight:bold; letter-spacing:6px; font-family:monospace;
             color:#fff; text-align:center; margin:6px 0; min-height:3rem; }
.plate-big.empty { color:#374151; font-size:1rem; font-weight:normal; letter-spacing:0; font-family:'Segoe UI',sans-serif; }
.plate-status { text-align:center; font-size:.8rem; margin-bottom:10px; min-height:1.2rem; }
.plate-status.inside { color:#fbbf24; }
.plate-status.free { color:#9ca3af; }
.actions { display:flex; gap:10px; justify-content:center; }
.actions button { flex:1; max-width:160px; padding:10px; border:none; border-radius:10px;
                  font-size:1rem; font-weight:700; cursor:pointer; }
#btn-entrada { background:#2563eb; color:#fff; }
#btn-salida  { background:#dc2626; color:#fff; }
.actions button:disabled { opacity:.35; cursor:default; }

/* ---- historial ---- */
.history-header { padding:10px 14px 6px; display:flex; justify-content:space-between; align-items:center; }
.history-header h2 { font-size:.9rem; color:#9ca3af; }
#btn-clear { font-size:.75rem; color:#6b7280; background:none; border:none; cursor:pointer; }
#history { overflow-y:auto; flex:1; padding:0 14px 14px; }
.record { background:#1f2937; border-radius:8px; padding:10px 12px; margin-bottom:8px;
          border-left:5px solid #374151; }
.record.open  { border-left-color:#fbbf24; }
.record.done  { border-left-color:#22c55e; }
.record .plate { font-size:1.2rem; font-weight:bold; letter-spacing:3px; font-family:monospace; }
.record .times { font-size:.75rem; color:#9ca3af; margin-top:3px; }
.record .dur   { font-size:.85rem; font-weight:600; color:#4ade80; margin-top:2px; }
.record .dur.open { color:#fbbf24; }
.history-empty { color:#374151; font-style:italic; text-align:center; padding:20px; }
</style>
</head>
<body>
<header>
  <h1>🅿️ <span>Cochera</span></h1>
  <button id="startbtn">▶ Iniciar</button>
</header>

<div class="stage">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hud">-- FPS · backend: --</div>
</div>

<div class="detect-panel">
  <div class="plate-big empty" id="plate-display">Apuntá a una patente</div>
  <div class="plate-status" id="plate-status"></div>
  <div class="actions">
    <button id="btn-entrada" disabled>⬆ Entrada</button>
    <button id="btn-salida"  disabled>⬇ Salida</button>
  </div>
</div>

<div class="history-header">
  <h2>Historial</h2>
  <button id="btn-clear">Limpiar todo</button>
</div>
<div id="history"></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const $ = id => document.getElementById(id);

// ==== modelo ====
const MODEL_URL = "models/license_plate.onnx";
const INPUT = 640, CONF = 0.35, NMS = 0.45;
const CLASSES = ["single_number_plate", "double_number_plate"];

// ==== patrones argentinos ====
const PLATE_RE = [/[A-Z]{2}[0-9]{3}[A-Z]{2}/, /[A-Z]{3}[0-9]{3}/];
function extractPlate(raw) {
  const t = raw.replace(/[^A-Z0-9]/g, '').toUpperCase();
  for (const p of PLATE_RE) { const m = p.exec(t); if (m) return m[0]; }
  return '';
}

// ==== estado ====
const video=$("video"), canvas=$("canvas"), ctx=canvas.getContext("2d");
const pre=document.createElement("canvas"); pre.width=INPUT; pre.height=INPUT;
const pctx=pre.getContext("2d",{willReadFrequently:true});
const ocrCanvas=document.createElement("canvas");
const ocrCtx=ocrCanvas.getContext("2d",{willReadFrequently:true});

let session=null, running=false;
let ocrWorker=null, ocrRunning=false;
let currentPlate='', lastValidPlate='';

// ==== cochera: persistencia ====
let records = JSON.parse(localStorage.getItem('cochera_records') || '[]');
// record: { plate, entry, exit }   exit=null si sigue adentro

function saveRecords() { localStorage.setItem('cochera_records', JSON.stringify(records)); }

function getOpen(plate) { return records.find(r => r.plate===plate && !r.exit); }

function registerEntry(plate) {
  if (getOpen(plate)) { alert(`${plate} ya tiene una entrada abierta.`); return; }
  records.unshift({ plate, entry: Date.now(), exit: null });
  saveRecords(); renderHistory();
}

function registerExit(plate) {
  const rec = getOpen(plate);
  if (!rec) { alert(`No hay entrada registrada para ${plate}.`); return; }
  rec.exit = Date.now();
  saveRecords(); renderHistory();
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'});
}
function fmtDur(ms) {
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  return h ? `${h}h ${m}min` : `${m}min`;
}

// ==== render historial ====
function renderHistory() {
  const el=$("history");
  if (!records.length) { el.innerHTML='<div class="history-empty">Sin registros aún</div>'; return; }
  el.innerHTML = records.map(r => {
    const dur = r.exit ? fmtDur(r.exit-r.entry) : fmtDur(Date.now()-r.entry);
    const dateStr = fmtDate(r.entry);
    return `<div class="record ${r.exit?'done':'open'}">
      <div class="plate">${r.plate}</div>
      <div class="times">${dateStr} · Entrada: ${fmtTime(r.entry)}${r.exit ? ` · Salida: ${fmtTime(r.exit)}` : ' · Aún adentro'}</div>
      <div class="dur ${r.exit?'':'open'}">${r.exit ? '⏱ '+dur : '🟡 '+dur+' (en curso)'}</div>
    </div>`;
  }).join('');
}

// ==== actualiza panel de patente detectada ====
function updateDetectPanel(plate) {
  const disp=$("plate-display"), status=$("plate-status");
  const btnE=$("btn-entrada"), btnS=$("btn-salida");
  if (!plate) {
    disp.textContent='Apuntá a una patente'; disp.className='plate-big empty';
    status.textContent=''; status.className='plate-status';
    btnE.disabled=true; btnS.disabled=true; return;
  }
  disp.textContent=plate; disp.className='plate-big';
  const open=getOpen(plate);
  if (open) {
    status.textContent=`Adentro desde ${fmtTime(open.entry)} · ${fmtDur(Date.now()-open.entry)}`;
    status.className='plate-status inside';
    btnE.disabled=true; btnS.disabled=false;
  } else {
    status.textContent='No está registrada como adentro';
    status.className='plate-status free';
    btnE.disabled=false; btnS.disabled=true;
  }
}

$("btn-entrada").onclick=()=>{ if(currentPlate){ registerEntry(currentPlate); updateDetectPanel(currentPlate); } };
$("btn-salida").onclick=()=>{ if(currentPlate){ registerExit(currentPlate); updateDetectPanel(currentPlate); } };
$("btn-clear").onclick=()=>{
  if(confirm('¿Borrar todo el historial?')){ records=[]; saveRecords(); renderHistory(); }
};

// ==== modelo + OCR ====
async function ensureModel(){
  if(session) return;
  $("hud").textContent='Cargando modelo...';
  let backend="wasm";
  if(navigator.gpu){
    try{ session=await ort.InferenceSession.create(MODEL_URL,{executionProviders:["webgpu"]}); backend="webgpu"; }
    catch(e){}
  }
  if(!session) session=await ort.InferenceSession.create(MODEL_URL,{executionProviders:["wasm"]});
  return backend;
}
async function ensureOCR(){
  if(ocrWorker) return;
  $("hud").textContent='Cargando OCR...';
  ocrWorker=await Tesseract.createWorker('eng');
  await ocrWorker.setParameters({ tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', tessedit_pageseg_mode:'7' });
}

$("startbtn").onclick=async()=>{
  if(running){ stop(); return; }
  await start();
};

async function start(){
  try{
    const [backend]=await Promise.all([ensureModel(), ensureOCR()]);
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=stream; await video.play();
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    running=true; $("startbtn").textContent='■ Detener'; $("startbtn").classList.add("on");
    acquireWakeLock(); loop();
  } catch(e){ $("hud").textContent='Error: '+e.message; }
}
function stop(){
  running=false; $("startbtn").textContent='▶ Iniciar'; $("startbtn").classList.remove("on");
  currentPlate=''; lastValidPlate=''; updateDetectPanel('');
  if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
}

// ==== wake lock ====
let wakeLock=null;
async function acquireWakeLock(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(running&&wakeLock&&document.visibilityState==="visible") acquireWakeLock(); });

// ==== preprocess deteccion ====
function preprocess(){
  const vw=video.videoWidth,vh=video.videoHeight,r=Math.min(INPUT/vw,INPUT/vh);
  const nw=Math.round(vw*r),nh=Math.round(vh*r);
  pctx.fillStyle="rgb(114,114,114)"; pctx.fillRect(0,0,INPUT,INPUT); pctx.drawImage(video,0,0,nw,nh);
  const data=pctx.getImageData(0,0,INPUT,INPUT).data, arr=new Float32Array(INPUT*INPUT*3), area=INPUT*INPUT;
  for(let i=0;i<area;i++){ const j=i*4; arr[i]=data[j]/255; arr[area+i]=data[j+1]/255; arr[2*area+i]=data[j+2]/255; }
  return {tensor:new ort.Tensor("float32",arr,[1,3,INPUT,INPUT]),r};
}

// ==== NMS ====
function iou(a,b){ const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]),x2=Math.min(a[2],b[2]),y2=Math.min(a[3],b[3]);
  const w=Math.max(0,x2-x1),h=Math.max(0,y2-y1),i=w*h; return i/((a[2]-a[0])*(a[3]-a[1])+(b[2]-b[0])*(b[3]-b[1])-i); }
function nms(boxes,scores,thr){ const idx=scores.map((s,i)=>i).sort((a,b)=>scores[b]-scores[a]),keep=[];
  while(idx.length){ const c=idx.shift(); keep.push(c); for(let k=idx.length-1;k>=0;k--) if(iou(boxes[c],boxes[idx[k]])>thr) idx.splice(k,1); } return keep; }

// ==== postprocess YOLOv8 ====
function postprocess(out,r){
  const d=out.data,dims=out.dims,nC=dims[1]-4,nA=dims[2];
  const boxes=[],scores=[],cls=[];
  for(let i=0;i<nA;i++){
    let b=0,bv=d[4*nA+i];
    for(let c=1;c<nC;c++){ const v=d[(4+c)*nA+i]; if(v>bv){bv=v;b=c;} }
    if(bv<CONF) continue;
    const cx=d[i],cy=d[nA+i],w=d[2*nA+i],h=d[3*nA+i];
    boxes.push([(cx-w/2)/r,(cy-h/2)/r,(cx+w/2)/r,(cy+h/2)/r]); scores.push(bv); cls.push(b);
  }
  const res=[];
  for(const c of [...new Set(cls)]){
    const gi=cls.map((v,i)=>i).filter(i=>cls[i]===c),gb=gi.map(i=>boxes[i]),gs=gi.map(i=>scores[i]);
    for(const k of nms(gb,gs,NMS)) res.push({box:gb[k],score:gs[k]});
  }
  return res;
}

// ==== OCR del recorte ====
function preprocessCrop(box){
  const [x1,y1,x2,y2]=box.map(Math.round);
  const w=Math.max(x2-x1,1),h=Math.max(y2-y1,1);
  const scale=Math.max(3,Math.round(100/h)), pad=15;
  ocrCanvas.width=w*scale+pad*2; ocrCanvas.height=h*scale+pad*2;
  ocrCtx.fillStyle='white'; ocrCtx.fillRect(0,0,ocrCanvas.width,ocrCanvas.height);
  ocrCtx.drawImage(video,x1,y1,w,h,pad,pad,w*scale,h*scale);
  const img=ocrCtx.getImageData(0,0,ocrCanvas.width,ocrCanvas.height),d=img.data;
  let sum=0;
  for(let i=0;i<d.length;i+=4) sum+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
  const mean=sum/(d.length/4);
  for(let i=0;i<d.length;i+=4){ const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2],v=g<mean?0:255; d[i]=d[i+1]=d[i+2]=v; }
  ocrCtx.putImageData(img,0,0);
  return ocrCanvas;
}

async function tryOCR(dets){
  if(!ocrWorker||ocrRunning||!dets.length) return;
  ocrRunning=true;
  try{
    const {data:{text}}=await ocrWorker.recognize(preprocessCrop(dets[0].box));
    const plate=extractPlate(text);
    if(plate && plate!==lastValidPlate){
      lastValidPlate=plate; currentPlate=plate;
      updateDetectPanel(plate);
    } else if(!plate && lastValidPlate) {
      // mantener ultima patente valida en pantalla mientras siga detectando algo
    }
  }catch(e){}
  ocrRunning=false;
}

// ==== draw ====
function drawFrame(dets){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  for(const d of dets){
    const [x1,y1,x2,y2]=d.box;
    ctx.lineWidth=3; ctx.strokeStyle=currentPlate?"#22c55e":"#4fc3f7";
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    if(currentPlate){
      ctx.font='bold 20px monospace'; const lbl=currentPlate;
      const tw=ctx.measureText(lbl).width, ty=Math.max(y1-26,0);
      ctx.fillStyle="#22c55e"; ctx.fillRect(x1,ty,tw+10,24);
      ctx.fillStyle="#000"; ctx.fillText(lbl,x1+5,ty+18);
    }
  }
  if(!dets.length && lastValidPlate){ lastValidPlate=''; currentPlate=''; updateDetectPanel(''); }
}

// ==== loop ====
let frames=0,lastT=performance.now(),backend='';
async function loop(){
  if(!running) return;
  const {tensor,r}=preprocess();
  const t0=performance.now();
  const out=await session.run({[session.inputNames[0]]:tensor});
  const inf=(performance.now()-t0).toFixed(0);
  const dets=postprocess(out[session.outputNames[0]],r);
  drawFrame(dets); tryOCR(dets);
  frames++; const now=performance.now();
  if(now-lastT>=500){
    const fps=(frames*1000/(now-lastT)).toFixed(1);
    $("hud").textContent=`${fps} FPS · ${inf}ms · ${dets.length} det.`;
    frames=0; lastT=now;
  }
  requestAnimationFrame(loop);
}

// ==== init ====
renderHistory();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
