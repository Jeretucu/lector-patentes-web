<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cochera</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1220; color:#e5e7eb; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

/* ---- header ---- */
header { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
h1 { font-size:1.1rem; } h1 span { color:#4fc3f7; }
#startbtn { padding:7px 16px; border:2px solid #16a34a; border-radius:20px; background:#0b1220;
            color:#fff; font-size:.85rem; font-weight:600; cursor:pointer; }
#startbtn.on { background:#16a34a; }

/* ---- video ---- */
.stage { position:relative; background:#000; width:100%; }
#canvas { width:100%; display:block; max-height:45vh; object-fit:contain; background:#000; }
#video { display:none; }
#hud { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.6); padding:4px 8px;
       border-radius:6px; font-size:.75rem; color:#4ade80; pointer-events:none; }

/* ---- panel deteccion ---- */
.detect-panel { padding:12px 14px; border-bottom:1px solid #1f2937; }
.plate-big { font-size:2.4rem; font-weight:bold; letter-spacing:6px; font-family:monospace;
             color:#fff; text-align:center; margin:6px 0; min-height:3rem; }
.plate-big.empty { color:#374151; font-size:1rem; font-weight:normal; letter-spacing:0; font-family:'Segoe UI',sans-serif; }
.plate-status { text-align:center; font-size:.8rem; margin-bottom:10px; min-height:1.2rem; }
.plate-status.inside { color:#fbbf24; }
.plate-status.free { color:#9ca3af; }
.actions { display:flex; gap:10px; justify-content:center; }
.actions button { flex:1; max-width:160px; padding:10px; border:none; border-radius:10px;
                  font-size:1rem; font-weight:700; cursor:pointer; }
#btn-entrada { background:#2563eb; color:#fff; }
#btn-salida  { background:#dc2626; color:#fff; }
.actions button:disabled { opacity:.35; cursor:default; }

/* ---- config panel ---- */
#cfg-toggle { background:none; border:none; color:#6b7280; font-size:1.2rem; cursor:pointer; padding:4px 8px; }
#cfg-toggle:hover { color:#e5e7eb; }
.api-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; display:inline-block; margin-right:5px; }
.api-dot.off { background:#374151; }
#cfg-panel { background:#111827; border-bottom:1px solid #1f2937; padding:10px 14px;
             display:flex; flex-direction:column; gap:7px; }
.cfg-row { display:flex; gap:8px; align-items:center; }
.cfg-row label { font-size:.72rem; color:#9ca3af; white-space:nowrap; min-width:56px; }
.cfg-row input { flex:1; background:#1f2937; border:1px solid #374151; border-radius:8px;
                 padding:7px 10px; color:#e5e7eb; font-size:.8rem; font-family:monospace; }
.cfg-row button { padding:7px 12px; border:none; border-radius:8px; background:#2563eb;
                  color:#fff; font-size:.8rem; font-weight:600; cursor:pointer; white-space:nowrap; }

/* ---- toast ---- */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
         background:#1f2937; border:1px solid #374151; border-radius:12px;
         padding:10px 18px; font-size:.9rem; font-weight:600; color:#fff;
         opacity:0; transition:opacity .3s; pointer-events:none; z-index:99; text-align:center; }
#toast.show { opacity:1; }
#toast.ok   { border-color:#22c55e; color:#4ade80; }
#toast.err  { border-color:#dc2626; color:#f87171; }

/* ---- historial ---- */
.history-header { padding:10px 14px 6px; display:flex; justify-content:space-between; align-items:center; }
.history-header h2 { font-size:.9rem; color:#9ca3af; }
#btn-clear { font-size:.75rem; color:#6b7280; background:none; border:none; cursor:pointer; }
#history { overflow-y:auto; flex:1; padding:0 14px 14px; }
.record { background:#1f2937; border-radius:8px; padding:10px 12px; margin-bottom:8px;
          border-left:5px solid #374151; }
.record.open  { border-left-color:#fbbf24; }
.record.done  { border-left-color:#22c55e; }
.record .plate { font-size:1.2rem; font-weight:bold; letter-spacing:3px; font-family:monospace; }
.record .times { font-size:.75rem; color:#9ca3af; margin-top:3px; }
.record .dur   { font-size:.85rem; font-weight:600; color:#4ade80; margin-top:2px; }
.record .dur.open { color:#fbbf24; }
.history-empty { color:#374151; font-style:italic; text-align:center; padding:20px; }
</style>
</head>
<body>
<header>
  <h1>🅿️ <span>Cochera</span></h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="api-dot" class="api-dot off" title="API no configurada"></span>
    <button id="cfg-toggle" title="Configurar API Key">⚙</button>
    <button id="startbtn">▶ Iniciar</button>
  </div>
</header>
<div id="cfg-panel" style="display:none;">
  <div class="cfg-row">
    <label>Servidor</label>
    <input id="server-input" type="text" placeholder="URL tunnel (https://...trycloudflare.com)" />
    <button id="server-save">OK</button>
  </div>
  <div class="cfg-row">
    <label>API Key</label>
    <input id="apikey-input" type="password" placeholder="API Key del dashboard" />
    <button id="cfg-save">OK</button>
  </div>
</div>
<div id="toast"></div>

<div class="stage">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hud">-- FPS · backend: --</div>
</div>

<div class="detect-panel">
  <div class="plate-big empty" id="plate-display">Apuntá a una patente</div>
  <div class="plate-status" id="plate-status"></div>
  <div class="actions">
    <button id="btn-entrada" disabled>⬆ Entrada</button>
    <button id="btn-salida"  disabled>⬇ Salida</button>
  </div>
</div>

<div class="history-header">
  <h2>Historial</h2>
  <button id="btn-clear">Limpiar todo</button>
</div>
<div id="history"></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.js"></script>
<script>
const $ = id => document.getElementById(id);

// ==== config ====
const MODEL_URL = "models/license_plate.onnx";
const INPUT = 640, CONF = 0.35, NMS = 0.45;
const API_URL = "https://camaras-saas.vercel.app/api/cochera/event";
const DEFAULT_SERVER = 'https://okay-clay-thus-continuous.trycloudflare.com';

let serverUrl = localStorage.getItem('cochera_server') || DEFAULT_SERVER;
let apiKey = localStorage.getItem('cochera_api_key') || '86f0ff58-358c-4063-99c8-d2c224e14192';

// ==== API dot ====
function updateApiDot() {
  const dot = $('api-dot');
  if (apiKey) { dot.classList.remove('off'); dot.title = 'API conectada'; }
  else         { dot.classList.add('off');    dot.title = 'API no configurada'; }
}
updateApiDot();

$('cfg-toggle').onclick = () => {
  const p = $('cfg-panel');
  p.style.display = p.style.display === 'none' ? 'flex' : 'none';
  if (p.style.display === 'flex') {
    $('server-input').value = serverUrl;
    $('apikey-input').value = apiKey;
  }
};
$('server-save').onclick = () => {
  serverUrl = $('server-input').value.trim().replace(/\/$/, '');
  localStorage.setItem('cochera_server', serverUrl);
  showToast('Servidor guardado', 'ok');
};
$('cfg-save').onclick = () => {
  apiKey = $('apikey-input').value.trim();
  localStorage.setItem('cochera_api_key', apiKey);
  $('cfg-panel').style.display = 'none';
  updateApiDot();
  showToast(apiKey ? 'API Key guardada' : 'API Key borrada', apiKey ? 'ok' : '');
};

// ==== Toast ====
let toastTimer;
function showToast(msg, type='') {
  const t = $('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ==== API call (dashboard) ====
function getFrameB64() {
  try {
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width; tmp.height = canvas.height;
    tmp.getContext('2d').drawImage(canvas, 0, 0);
    return tmp.toDataURL('image/jpeg', 0.8);
  } catch(e) { return null; }
}

async function callAPI(plate) {
  if (!apiKey) return null;
  const image = getFrameB64();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: apiKey, plate, image }),
    });
    return await res.json();
  } catch(e) { return { error: 'Sin conexión' }; }
}

// ==== estado ====
const video=$("video"), canvas=$("canvas"), ctx=canvas.getContext("2d");
const pre=document.createElement("canvas"); pre.width=INPUT; pre.height=INPUT;
const pctx=pre.getContext("2d",{willReadFrequently:true});

let session=null, running=false;
let serverOcrRunning=false;
let currentPlate='', lastValidPlate='';
let lastOcrRaw='';

// ==== cochera: persistencia ====
let records = JSON.parse(localStorage.getItem('cochera_records') || '[]');

function saveRecords() { localStorage.setItem('cochera_records', JSON.stringify(records)); }
function getOpen(plate) { return records.find(r => r.plate===plate && !r.exit); }

async function registerEntry(plate) {
  if (getOpen(plate)) { showToast(`${plate} ya está adentro`, 'err'); return; }
  records.unshift({ plate, entry: Date.now(), exit: null });
  saveRecords(); renderHistory(); updateDetectPanel(plate);
  if (apiKey) {
    const resp = await callAPI(plate);
    if (resp?.event === 'entry') showToast(`⬆ Entrada: ${plate}`, 'ok');
    else if (resp?.error)        showToast('Error API: ' + resp.error, 'err');
  } else { showToast(`⬆ Entrada: ${plate} (sin API)`, ''); }
}

async function registerExit(plate) {
  const rec = getOpen(plate);
  if (!rec) { showToast(`No hay entrada abierta para ${plate}`, 'err'); return; }
  rec.exit = Date.now();
  saveRecords(); renderHistory(); updateDetectPanel(plate);
  if (apiKey) {
    const resp = await callAPI(plate);
    if (resp?.event === 'exit') {
      const dur = resp.duration_secs ? fmtDur(resp.duration_secs * 1000) : '';
      showToast(`⬇ Salida: ${plate}${dur ? ' · ' + dur : ''}`, 'ok');
    } else if (resp?.error) showToast('Error API: ' + resp.error, 'err');
  } else { showToast(`⬇ Salida: ${plate} (sin API)`, ''); }
}

function fmtTime(ts) { return new Date(ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); }
function fmtDur(ms) {
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  return h ? `${h}h ${m}min` : `${m}min`;
}

function renderHistory() {
  const el=$("history");
  if (!records.length) { el.innerHTML='<div class="history-empty">Sin registros aún</div>'; return; }
  el.innerHTML = records.map(r => {
    const dur = r.exit ? fmtDur(r.exit-r.entry) : fmtDur(Date.now()-r.entry);
    return `<div class="record ${r.exit?'done':'open'}">
      <div class="plate">${r.plate}</div>
      <div class="times">${fmtDate(r.entry)} · Entrada: ${fmtTime(r.entry)}${r.exit ? ` · Salida: ${fmtTime(r.exit)}` : ' · Aún adentro'}</div>
      <div class="dur ${r.exit?'':'open'}">${r.exit ? '⏱ '+dur : '🟡 '+dur+' (en curso)'}</div>
    </div>`;
  }).join('');
}

function updateDetectPanel(plate) {
  const disp=$("plate-display"), status=$("plate-status");
  const btnE=$("btn-entrada"), btnS=$("btn-salida");
  if (!plate) {
    disp.textContent='Apuntá a una patente'; disp.className='plate-big empty';
    status.textContent=''; status.className='plate-status';
    btnE.disabled=true; btnS.disabled=true; return;
  }
  disp.textContent=plate; disp.className='plate-big';
  const open=getOpen(plate);
  if (open) {
    status.textContent=`Adentro desde ${fmtTime(open.entry)} · ${fmtDur(Date.now()-open.entry)}`;
    status.className='plate-status inside';
    btnE.disabled=true; btnS.disabled=false;
  } else {
    status.textContent='No está registrada como adentro';
    status.className='plate-status free';
    btnE.disabled=false; btnS.disabled=true;
  }
}

$("btn-entrada").onclick=async()=>{ if(currentPlate) await registerEntry(currentPlate); };
$("btn-salida").onclick=async()=>{ if(currentPlate) await registerExit(currentPlate); };
$("btn-clear").onclick=()=>{
  if(confirm('¿Borrar todo el historial?')){ records=[]; saveRecords(); renderHistory(); }
};

// ==== modelo ====
async function ensureModel(){
  if(session) return;
  $("hud").textContent='Cargando modelo...';
  if(navigator.gpu){
    try{ session=await ort.InferenceSession.create(MODEL_URL,{executionProviders:["webgpu"]}); }
    catch(e){}
  }
  if(!session) session=await ort.InferenceSession.create(MODEL_URL,{executionProviders:["wasm"]});
}

$("startbtn").onclick=async()=>{ if(running){ stop(); return; } await start(); };

async function start(){
  try{
    await ensureModel();
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=stream; await video.play();
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    running=true; $("startbtn").textContent='■ Detener'; $("startbtn").classList.add("on");
    acquireWakeLock(); loop();
  } catch(e){ $("hud").textContent='Error: '+e.message; }
}
function stop(){
  running=false; $("startbtn").textContent='▶ Iniciar'; $("startbtn").classList.remove("on");
  currentPlate=''; lastValidPlate=''; updateDetectPanel('');
  if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
}

let wakeLock=null;
async function acquireWakeLock(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(running&&wakeLock&&document.visibilityState==="visible") acquireWakeLock(); });

// ==== preprocess ====
function preprocess(){
  const vw=video.videoWidth,vh=video.videoHeight,r=Math.min(INPUT/vw,INPUT/vh);
  const nw=Math.round(vw*r),nh=Math.round(vh*r);
  pctx.fillStyle="rgb(114,114,114)"; pctx.fillRect(0,0,INPUT,INPUT); pctx.drawImage(video,0,0,nw,nh);
  const data=pctx.getImageData(0,0,INPUT,INPUT).data, arr=new Float32Array(INPUT*INPUT*3), area=INPUT*INPUT;
  for(let i=0;i<area;i++){ const j=i*4; arr[i]=data[j]/255; arr[area+i]=data[j+1]/255; arr[2*area+i]=data[j+2]/255; }
  return {tensor:new ort.Tensor("float32",arr,[1,3,INPUT,INPUT]),r};
}

// ==== NMS ====
function iou(a,b){ const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]),x2=Math.min(a[2],b[2]),y2=Math.min(a[3],b[3]);
  const w=Math.max(0,x2-x1),h=Math.max(0,y2-y1),i=w*h; return i/((a[2]-a[0])*(a[3]-a[1])+(b[2]-b[0])*(b[3]-b[1])-i); }
function nms(boxes,scores,thr){ const idx=scores.map((s,i)=>i).sort((a,b)=>scores[b]-scores[a]),keep=[];
  while(idx.length){ const c=idx.shift(); keep.push(c); for(let k=idx.length-1;k>=0;k--) if(iou(boxes[c],boxes[idx[k]])>thr) idx.splice(k,1); } return keep; }

// ==== postprocess YOLOv8 [1, 4+cls, anchors] ====
function postprocess(out,r){
  const d=out.data,dims=out.dims,nC=dims[1]-4,nA=dims[2];
  const boxes=[],scores=[],cls=[];
  for(let i=0;i<nA;i++){
    let b=0,bv=d[4*nA+i];
    for(let c=1;c<nC;c++){ const v=d[(4+c)*nA+i]; if(v>bv){bv=v;b=c;} }
    if(bv<CONF) continue;
    const cx=d[i],cy=d[nA+i],w=d[2*nA+i],h=d[3*nA+i];
    boxes.push([(cx-w/2)/r,(cy-h/2)/r,(cx+w/2)/r,(cy+h/2)/r]); scores.push(bv); cls.push(b);
  }
  const res=[];
  for(const c of [...new Set(cls)]){
    const gi=cls.map((v,i)=>i).filter(i=>cls[i]===c),gb=gi.map(i=>boxes[i]),gs=gi.map(i=>scores[i]);
    for(const k of nms(gb,gs,NMS)) res.push({box:gb[k],score:gs[k]});
  }
  return res;
}

// ==== voting ====
const ocrVotes=[];
const VOTE_WIN=4, VOTE_THR=2;

function voteForPlate(plate){
  ocrVotes.push(plate||'');
  if(ocrVotes.length>VOTE_WIN) ocrVotes.shift();
  // Votar por posicion: prefijo (0-4) requiere VOTE_THR, sufijo (5-6) solo 1 voto
  for(const len of [7,6]){
    const valid=ocrVotes.filter(p=>p&&p.length===len);
    if(valid.length<VOTE_THR) continue;
    let result='', ok=true;
    for(let i=0;i<len;i++){
      const freq={};
      for(const p of valid) freq[p[i]]=(freq[p[i]]||0)+1;
      let best='',bestN=0;
      for(const [c,n] of Object.entries(freq)) if(n>bestN){best=c;bestN=n;}
      const thr=i<len-2?VOTE_THR:1; // prefijo estricto, sufijo rapido
      if(bestN<thr){ok=false;break;}
      result+=best;
    }
    if(ok) return result;
  }
  return '';
}

// ==== Server OCR ====
async function tryServerOCR(dets){
  if(serverOcrRunning||!dets.length||!serverUrl) return;
  serverOcrRunning=true;
  try{
    const [x1,y1,x2,y2]=dets[0].box.map(Math.round);
    const w=Math.max(x2-x1,1), h=Math.max(y2-y1,1);
    const yNum=Math.round(y1+h*0.35);
    const hNum=Math.max(y2-yNum,1);
    // El bbox de YOLO suele cortar el último char → más padding a la derecha
    const padL=Math.round(w*0.08), padR=Math.round(w*0.40), padY=Math.round(hNum*0.08);
    const sx=Math.max(0,x1-padL), sy=Math.max(0,yNum-padY);
    const sw=Math.min(canvas.width-sx, w+padL+padR), sh=Math.min(canvas.height-sy, hNum+padY*2);
    const scale=2;
    const tmp=document.createElement('canvas');
    tmp.width=sw*scale; tmp.height=sh*scale;
    const tc=tmp.getContext('2d');
    tc.fillStyle='#808080'; tc.fillRect(0,0,tmp.width,tmp.height);
    tc.drawImage(video,sx,sy,sw,sh,0,0,sw*scale,sh*scale);
    const b64=tmp.toDataURL('image/png');

    const res=await fetch(serverUrl+'/ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:b64}),
      signal:AbortSignal.timeout(4000)
    });
    const data=await res.json();
    if(data.raw) lastOcrRaw=data.raw;
    const confirmed=voteForPlate(data.plate||'');
    if(confirmed&&confirmed!==currentPlate){
      currentPlate=confirmed; lastValidPlate=confirmed;
      updateDetectPanel(confirmed);
    }
  }catch(e){}
  serverOcrRunning=false;
}

// ==== draw ====
function drawFrame(dets){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  for(const d of dets){
    const [x1,y1,x2,y2]=d.box;
    ctx.lineWidth=3; ctx.strokeStyle=currentPlate?"#22c55e":"#4fc3f7";
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    if(currentPlate){
      ctx.font='bold 20px monospace'; const lbl=currentPlate;
      const tw=ctx.measureText(lbl).width, ty=Math.max(y1-26,0);
      ctx.fillStyle="#22c55e"; ctx.fillRect(x1,ty,tw+10,24);
      ctx.fillStyle="#000"; ctx.fillText(lbl,x1+5,ty+18);
    }
  }
  if(!dets.length && lastValidPlate){
    lastValidPlate=''; currentPlate='';
    ocrVotes.length=0; // limpiar votos al perder la deteccion
    updateDetectPanel('');
  }
}

// ==== loop ====
let frames=0,lastT=performance.now();
async function loop(){
  if(!running) return;
  const {tensor,r}=preprocess();
  const t0=performance.now();
  const out=await session.run({[session.inputNames[0]]:tensor});
  const inf=(performance.now()-t0).toFixed(0);
  const dets=postprocess(out[session.outputNames[0]],r);
  drawFrame(dets); tryServerOCR(dets);
  frames++; const now=performance.now();
  if(now-lastT>=500){
    const fps=(frames*1000/(now-lastT)).toFixed(1);
    $("hud").textContent=`${fps} FPS · ${inf}ms · ${dets.length} det.${lastOcrRaw?' | ocr:'+lastOcrRaw:''}`;
    frames=0; lastT=now;
  }
  requestAnimationFrame(loop);
}

// ==== init ====
renderHistory();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
